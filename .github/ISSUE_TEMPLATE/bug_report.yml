name: Bug Report
description: Report a gameplay, UI, save, audio, or performance problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the issue.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - UI / UX
        - Endless / Weekly
        - Research / Meta
        - Audio
        - Performance
        - Save / Load
        - Tests / Tooling
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include a deterministic path if possible.
      placeholder: |
        1. Start a run on...
        2. Open...
        3. Trigger...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste console errors, screenshots, clips, or save details.

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, local or Pages URL, branch or commit if known
